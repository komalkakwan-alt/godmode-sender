<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailboxes - God-Mode Sender</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-200 flex">
    <div class="w-64 bg-black p-6 flex flex-col space-y-4 min-h-screen">
        <h1 class="text-2xl font-bold text-white mb-8">God-Mode Sender</h1>
        <a href="index.html" class="hover:text-blue-400 font-medium">📊 My Stats</a>
        <a href="mailboxes.html" class="text-blue-400 font-medium">📬 Mailboxes</a>
        <a href="/api/logout" class="hover:text-red-400 font-medium mt-auto">🚪 Logout</a>
    </div>

    <div class="flex-1 p-10 overflow-auto">
        <h2 class="text-3xl font-bold mb-8">Mailboxes & Proxies</h2>

        <div class="bg-gray-800 p-6 rounded-lg mb-10 shadow-lg max-w-xl">
            <h3 class="text-xl font-bold mb-2">Upload Mailboxes CSV</h3>
            <p class="text-gray-400 text-sm mb-4">Columns required: <b>email, app_password</b></p>
            <form id="mbForm" enctype="multipart/form-data" class="flex space-x-4">
                <input type="file" name="file" accept=".csv" class="p-2 bg-gray-700 rounded flex-1 text-sm" required>
                <button type="submit" class="bg-purple-600 hover:bg-purple-700 px-5 py-2 rounded font-bold text-sm">Upload & Add</button>
            </form>
        </div>

        <div class="bg-gray-800 rounded-lg shadow-lg overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-700 text-gray-400 uppercase text-xs">
                    <tr>
                        <th class="p-4">Email</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Sent / Limit</th>
                        <th class="p-4">Dispatch Mode</th>
                        <th class="p-4">SOCKS5 Proxy URL</th>
                        <th class="p-4">SMTP Auth</th>
                    </tr>
                </thead>
                <tbody id="mbTable" class="divide-y divide-gray-700"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadMailboxes() {
            const res = await fetch('/api/mailboxes');
            const data = await res.json();
            const tbody = document.getElementById('mbTable');
            tbody.innerHTML = '';
            
            data.forEach(m => {
                const isPC = m.send_mode === 'local_computer';
                const statusColor = m.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400';
                const authText = m.inbox_auth_status === 'verified' ? 'Auth Verified ✅' : (m.inbox_auth_status === 'failed' ? 'Auth Failed ❌' : 'Check Inbox Auth');

                tbody.innerHTML += `
                <tr class="hover:bg-gray-700/50">
                    <td class="p-4 font-medium text-white">${m.email}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs ${statusColor}">${m.status}</span></td>
                    <td class="p-4">${m.sent_today} / ${m.daily_limit}</td>
                    <td class="p-4">
                        <select onchange="updateMode('${m.email}', this.value)" class="bg-gray-900 border border-gray-600 rounded p-1 text-xs text-yellow-400">
                            <option value="cloud_proxy" ${!isPC ? 'selected':''}>☁️ Cloud Proxy</option>
                            <option value="local_computer" ${isPC ? 'selected':''}>🖥️ My Computer</option>
                        </select>
                    </td>
                    <td class="p-4">
                        <input type="text" placeholder="socks5://user:pass@ip:port" value="${m.proxy_url || ''}" 
                        onblur="updateProxy('${m.email}', this.value)" class="bg-gray-900 border border-gray-600 rounded p-1 text-xs w-48 text-gray-300">
                    </td>
                    <td class="p-4">
                        <button onclick="verifyAuth('${m.email}')" class="bg-blue-600/30 hover:bg-blue-600 text-blue-300 px-3 py-1 rounded text-xs transition border border-blue-500/30">
                            ${authText}
                        </button>
                    </td>
                </tr>`;
            });
        }

        document.getElementById('mbForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/api/mailboxes/upload-csv', { method: 'POST', body: new FormData(e.target) });
            const data = await res.json();
            alert(data.message);
            loadMailboxes();
        });

        async function updateMode(email, mode) {
            await fetch('/api/mailboxes/update-mode', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email, send_mode: mode }) });
        }
        async function updateProxy(email, proxy) {
            await fetch('/api/mailboxes/update-mode', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email, proxy_url: proxy }) });
        }
        async function verifyAuth(email) {
            const res = await fetch('/api/mailboxes/verify-auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ email }) });
            const data = await res.json();
            alert(data.message || data.error);
            loadMailboxes();
        }

        loadMailboxes();
    </script>
</body>
</html>
