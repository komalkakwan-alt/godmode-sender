<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - God-Mode Sender</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-2xl w-96">
        <h1 class="text-3xl font-bold text-white text-center mb-8">God-Mode Sender</h1>
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-gray-400 mb-2">Email</label>
                <input type="email" id="email" required class="w-full p-3 bg-gray-700 rounded text-white outline-none focus:ring-2 focus:ring-purple-600" placeholder="Enter your email">
            </div>
            <div>
                <label class="block text-gray-400 mb-2">Password</label>
                <input type="password" id="password" required class="w-full p-3 bg-gray-700 rounded text-white outline-none focus:ring-2 focus:ring-purple-600" placeholder="Enter your password">
            </div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded transition duration-200">Sign in</button>
        </form>
        <p id="errorMsg" class="text-red-500 text-center mt-4 hidden"></p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            try {
                const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                const data = await res.json();
                if (res.ok) { window.location.href = '/'; } 
                else { errorMsg.textContent = data.error; errorMsg.classList.remove('hidden'); }
            } catch (err) { errorMsg.textContent = "सर्वर से कनेक्ट नहीं हो सका।"; errorMsg.classList.remove('hidden'); }
        });
    </script>
</body>
</html>
